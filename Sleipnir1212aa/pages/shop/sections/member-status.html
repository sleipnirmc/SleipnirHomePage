<!-- Member Status Indicator -->
<div id="memberStatusIndicator" style="display: none; background: #333; color: white; padding: 10px 20px; text-align: center; border-bottom: 2px solid #cf2342;">
    <div style="max-width: 1200px; margin: 0 auto;">
        <span id="statusMessage"></span>
        <button id="checkStatusBtn" class="btn btn-sm" style="margin-left: 20px; background: #cf2342; color: white; border: none; padding: 5px 15px; cursor: pointer;" onclick="sleipnirAuth.checkMemberStatus()">
            Check Status
        </button>
        <button id="fixStatusBtn" class="btn btn-sm" style="margin-left: 10px; background: #4CAF50; color: white; border: none; padding: 5px 15px; cursor: pointer; display: none;" onclick="fixMemberStatusUI()">
            Fix Member Status
        </button>
    </div>
</div>
