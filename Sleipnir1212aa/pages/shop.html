<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleipnir MC Reykjav&iacute;k - Verslun</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="navbar-root"></div>

    <!-- Shop Hero -->
    <section class="hero hero-small shop-hero">
        <div class="hero-overlay"></div>
        <h1 class="shop-title" data-i18n="shop.hero.title">Verslun Sleipnis</h1>
    </section>

    <!-- Member Status Indicator -->
    <div id="memberStatusIndicator" style="display: none; background: #333; color: white; padding: 10px 20px; text-align: center; border-bottom: 2px solid #cf2342;">
        <div style="max-width: 1200px; margin: 0 auto;">
            <span id="statusMessage"></span>
            <button id="checkStatusBtn" class="btn btn-sm" style="margin-left: 20px; background: #cf2342; color: white; border: none; padding: 5px 15px; cursor: pointer;" onclick="sleipnirAuth.checkMemberStatus()">
                Check Status
            </button>
            <button id="fixStatusBtn" class="btn btn-sm" style="margin-left: 10px; background: #4CAF50; color: white; border: none; padding: 5px 15px; cursor: pointer; display: none;" onclick="fixMemberStatusUI()">
                Fix Member Status
            </button>
        </div>
    </div>

    <!-- Category Filter -->
    <section class="category-filter">
        <div class="filter-container">
            <h2 class="filter-title" data-i18n="shop.categories.title">Flokkar</h2>
            <div class="filter-buttons">
                <button class="btn btn-outline btn-sm active" data-category="all" data-i18n="shop.categories.all">Allt</button>
                <button class="btn btn-outline btn-sm" data-category="tshirt" data-i18n="shop.categories.tshirt">Bolir</button>
                <button class="btn btn-outline btn-sm" data-category="jeans" data-i18n="shop.categories.jeans">Buxur</button>
                <button class="btn btn-outline btn-sm" data-category="jacket" data-i18n="shop.categories.jacket">Jakkar</button>
                <button class="btn btn-outline btn-sm" data-category="hoodie" data-i18n="shop.categories.hoodie">Hettupeysur</button>
                <button class="btn btn-outline btn-sm" data-category="other" data-i18n="shop.categories.other">Anna&eth;</button>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="shop-products">
        <div class="products-container">
            <div class="product-grid" id="productGrid">
                <!-- Products will be loaded dynamically from Firebase -->
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p data-i18n="shop.loading">Hle&eth;ur v&ouml;rur...</p>
                </div>
            </div>
            <div class="pagination-controls" id="paginationControls">
                <!-- Pagination will be added dynamically -->
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3 data-i18n="shop.cart.title">Karfa</h3>
            <button class="close-cart" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be added dynamically -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span data-i18n="shop.cart.total">Samtals:</span>
                <span id="cartTotal">0 ISK</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" data-i18n="shop.cart.checkout">Ganga fr&aacute; kaupum</button>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="product-modal">
        <div class="product-modal-content">
            <span class="modal-close" onclick="closeProductModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-images">
                    <img id="modalMainImage" class="main-image" src="" alt="">
                    <div class="image-thumbnails" id="modalThumbnails">
                        <!-- Thumbnails will be populated dynamically -->
                    </div>
                </div>
                <div class="modal-info">
                    <h2 id="modalProductName">
                        <span class="is"></span>
                        <span class="en"></span>
                    </h2>
                    <p class="modal-price" id="modalPrice"></p>
                    <p class="modal-description" id="modalDescription"></p>

                    <div class="modal-sizes">
                        <h3 data-i18n="shop.modal.selectSize">Veldu st&aelig;r&eth;</h3>
                        <div class="modal-size-options" id="modalSizes">
                            <!-- Sizes will be populated dynamically -->
                        </div>
                    </div>

                    <button class="btn btn-primary btn-full" id="modalAddToCart" data-i18n="shop.modal.addToCart">B&aelig;ta &iacute; k&ouml;rfu</button>

                    <div class="product-features">
                        <h3 data-i18n="shop.modal.features">Eiginleikar</h3>
                        <ul class="feature-list">
                            <li data-i18n="shop.modal.feature1">H&aacute;g&aelig;&eth;a efni</li>
                            <li data-i18n="shop.modal.feature2">Handunni&eth; me&eth; &aacute;st</li>
                            <li data-i18n="shop.modal.feature3">Opinber Sleipnir MC vara</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-root"></div>

    <!-- Core scripts -->
    <script src="/js/i18n.js"></script>
    <script src="/js/translations/core.js"></script>
    <script src="/js/translations/shop.js"></script>
    <script src="/js/nav-config.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js"></script>

    <!-- Firebase + Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/authentication.js"></script>

    <!-- Shop script -->
    <script src="/js/page-scripts/shop.js"></script>

    <script>
        // Protect this page - require email verification
        sleipnirAuth.protectVerifiedPage('/pages/login.html');

        // Member Status Indicator - Always hidden for clean UI
        function updateMemberStatusIndicator() {
            var indicator = document.getElementById('memberStatusIndicator');
            // Always hide the status indicator - member status is shown subtly in the dropdown instead
            if (indicator) {
                indicator.style.display = 'none';
            }
        }

        // Fix member status UI function
        async function fixMemberStatusUI() {
            var fixBtn = document.getElementById('fixStatusBtn');
            var originalText = fixBtn.textContent;
            fixBtn.textContent = 'Fixing...';
            fixBtn.disabled = true;

            try {
                var result = await sleipnirAuth.fixMemberStatus(true);
                if (result.success) {
                    alert('Member status has been fixed! The page will refresh.');
                    window.location.reload();
                } else {
                    alert('Error fixing member status: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                fixBtn.textContent = originalText;
                fixBtn.disabled = false;
            }
        }

        // Listen for auth state changes to update indicator
        window.addEventListener('authStateChanged', function () {
            setTimeout(updateMemberStatusIndicator, 100);
        });

        // Also update on page load
        setTimeout(updateMemberStatusIndicator, 1000);
    </script>
</body>
</html>
