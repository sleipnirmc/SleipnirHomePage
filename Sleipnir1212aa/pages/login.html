<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleipnir MC - Login</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-split-container">
        <!-- Left Visual Section -->
        <div class="login-visual-section">
            <div class="visual-bg-pattern"></div>

            <div class="visual-logo-container">
                <img src="/assets/images/SleipnirLogo.png" alt="Sleipnir MC" class="visual-logo">
                <div class="visual-text">
                    <h1 class="visual-title">SLEIPNIR MC</h1>
                    <p class="visual-motto">NO DRUGS &bull; NO ATTITUDE</p>
                </div>
            </div>

            <div class="visual-decoration">
                <div class="corner-accent top-left"></div>
                <div class="corner-accent bottom-right"></div>
            </div>
        </div>

        <!-- Right Form Section -->
        <div class="login-form-section">
            <div class="split-form-container">
                <!-- Form Header -->
                <div class="split-form-header">
                    <h2 class="split-form-title" data-i18n="login.title">Velkomin</h2>
                    <p class="split-form-subtitle" data-i18n="login.subtitle">Skr&#225;&#240;u &#254;ig inn &#225; sv&#230;&#240;i&#240;</p>
                </div>

                <!-- Tab Navigation -->
                <div class="form-tabs">
                    <button class="tab-btn active" data-tab="login" data-i18n="login.tab.login">Innskr&#225;</button>
                    <button class="tab-btn" data-tab="signup" data-i18n="login.tab.signup">N&#253;skr&#225;</button>
                </div>

                <!-- Login Form -->
                <form class="split-login-form" id="authForm">
                    <!-- Email Field -->
                    <div class="split-input-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email" data-i18n="login.email">Netfang</label>
                        <span class="input-icon">&#9993;</span>
                    </div>

                    <!-- Password Field -->
                    <div class="split-input-group">
                        <input type="password" id="password" placeholder=" " required>
                        <label for="password" data-i18n="login.password">Lykilor&#240;</label>
                        <span class="input-icon">&#128274;</span>
                    </div>

                    <!-- Confirm Password (for signup) -->
                    <div class="split-input-group" id="confirmGroup" style="display: none;">
                        <input type="password" id="confirmPassword" placeholder=" ">
                        <label for="confirmPassword" data-i18n="login.confirm_password">Sta&#240;festa Lykilor&#240;</label>
                        <span class="input-icon">&#128274;</span>
                    </div>

                    <!-- Name Field (for signup) -->
                    <div class="split-input-group" id="nameGroup" style="display: none;">
                        <input type="text" id="fullName" placeholder=" ">
                        <label for="fullName" data-i18n="login.fullname">Fullt Nafn</label>
                        <span class="input-icon">&#128100;</span>
                    </div>

                    <!-- Phone Field (for signup) -->
                    <div class="split-input-group" id="phoneGroup" style="display: none;">
                        <input type="tel" id="phone" placeholder=" " pattern="[+]?[(]?[0-9]{1,4}[)]?[-\s.]*[(]?[0-9]{1,4}[)]?[-\s.]*[0-9]{1,9}[-\s.]*[0-9]{0,9}" title="Format: +1 (555) 123-4567 or 555-1234 or +354 123 4567">
                        <label for="phone" data-i18n="login.phone">S&#237;man&#250;mer</label>
                        <span class="input-icon">&#128241;</span>
                    </div>

                    <!-- Address Field (for signup) -->
                    <div class="split-input-group" id="addressGroup" style="display: none;">
                        <input type="text" id="address" placeholder=" ">
                        <label for="address" data-i18n="login.address">Heimilisfang</label>
                        <span class="input-icon">&#127968;</span>
                    </div>

                    <!-- City Field (for signup) -->
                    <div class="split-input-group" id="cityGroup" style="display: none;">
                        <input type="text" id="city" placeholder=" ">
                        <label for="city" data-i18n="login.city">Borg/B&#230;r</label>
                        <span class="input-icon">&#127961;&#65039;</span>
                    </div>

                    <!-- Postal Code Field (for signup) -->
                    <div class="split-input-group" id="postalGroup" style="display: none;">
                        <input type="text" id="postalCode" placeholder=" " pattern="[0-9]{3}" title="3 digit postal code">
                        <label for="postalCode" data-i18n="login.postal">P&#243;stn&#250;mer</label>
                        <span class="input-icon">&#128238;</span>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="split-submit-btn" data-i18n="login.btn.login">Innskr&#225;</button>

                    <!-- Additional Options -->
                    <div class="split-form-options">
                        <label class="split-checkbox-group">
                            <input type="checkbox" id="rememberMe">
                            <span data-i18n="login.remember">Muna mig</span>
                        </label>
                        <a href="#" class="split-link" data-i18n="login.forgot">Gleymt lykilor&#240;?</a>
                    </div>
                </form>

                <!-- Social Login Section -->
                <div class="split-social-section">
                    <p class="split-social-title" data-i18n="login.social.title">E&#240;a skr&#225;&#240;u &#254;ig inn me&#240;</p>
                    <div class="split-social-buttons">
                        <button class="social-btn">
                            <span>&#127760;</span>
                            <span>Google</span>
                        </button>
                        <button class="social-btn">
                            <span>&#128216;</span>
                            <span>Facebook</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- i18n Scripts -->
    <script src="/js/i18n.js"></script>
    <script src="/js/translations/core.js"></script>
    <script src="/js/translations/login.js"></script>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/authentication.js"></script>
    <script>
        // Tab switching functionality
        const tabs = document.querySelectorAll('.tab-btn');
        const confirmGroup = document.getElementById('confirmGroup');
        const nameGroup = document.getElementById('nameGroup');
        const phoneGroup = document.getElementById('phoneGroup');
        const addressGroup = document.getElementById('addressGroup');
        const cityGroup = document.getElementById('cityGroup');
        const postalGroup = document.getElementById('postalGroup');
        const submitBtn = document.querySelector('.split-submit-btn');
        const formTitle = document.querySelector('.split-form-title');
        const formSubtitle = document.querySelector('.split-form-subtitle');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Update active tab
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const isSignup = tab.dataset.tab === 'signup';

                // Show/hide signup fields
                confirmGroup.style.display = isSignup ? 'block' : 'none';
                nameGroup.style.display = isSignup ? 'block' : 'none';
                phoneGroup.style.display = isSignup ? 'block' : 'none';
                addressGroup.style.display = isSignup ? 'block' : 'none';
                cityGroup.style.display = isSignup ? 'block' : 'none';
                postalGroup.style.display = isSignup ? 'block' : 'none';

                // Re-trigger animations for new fields
                if (isSignup) {
                    setTimeout(() => {
                        observeElements();
                    }, 100);
                }

                // Update button text via i18n
                if (isSignup) {
                    submitBtn.setAttribute('data-i18n', 'login.btn.signup');
                    submitBtn.textContent = window.SleipnirI18n.t('login.btn.signup', 'Create Account');
                    formTitle.setAttribute('data-i18n', 'login.title.signup');
                    formTitle.textContent = window.SleipnirI18n.t('login.title.signup', 'Create Account');
                    formSubtitle.setAttribute('data-i18n', 'login.subtitle.signup');
                    formSubtitle.textContent = window.SleipnirI18n.t('login.subtitle.signup', 'Join our community');
                } else {
                    submitBtn.setAttribute('data-i18n', 'login.btn.login');
                    submitBtn.textContent = window.SleipnirI18n.t('login.btn.login', 'Login');
                    formTitle.setAttribute('data-i18n', 'login.title');
                    formTitle.textContent = window.SleipnirI18n.t('login.title', 'Welcome');
                    formSubtitle.setAttribute('data-i18n', 'login.subtitle');
                    formSubtitle.textContent = window.SleipnirI18n.t('login.subtitle', 'Access your account');
                }
            });
        });

        // Check for redirect parameter from admin page
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect');
        const error = urlParams.get('error');
        const sessionExpired = urlParams.get('session_expired');
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');

        // Handle email verification mode
        if (mode === 'verifyEmail' && oobCode) {
            sleipnirAuth.showAuthMessage({
                is: 'Netfang veri\u00f0 a\u00f0 sta\u00f0festa...',
                en: 'Verifying email...'
            }, false);

            firebase.auth().applyActionCode(oobCode).then(() => {
                sleipnirAuth.showAuthMessage({
                    is: 'Netfang hefur veri\u00f0 sta\u00f0fest! \u00de\u00fa getur n\u00fa skr\u00e1\u00f0 \u00feig inn.',
                    en: 'Email has been verified! You can now sign in.'
                }, false);

                if (firebase.auth().currentUser) {
                    firebase.auth().currentUser.reload();
                }
            }).catch((error) => {
                console.error('Email verification error:', error);
                sleipnirAuth.showAuthMessage({
                    is: 'Villa kom upp vi\u00f0 sta\u00f0festingu. Vinsamlegast reyndu aftur.',
                    en: 'Error verifying email. Please try again.'
                }, true);
            });
        }

        if (error) {
            sleipnirAuth.showAuthMessage(decodeURIComponent(error), true);
        }

        if (sessionExpired) {
            sleipnirAuth.showAuthMessage({
                is: 'Innskr\u00e1ning rann \u00fat. Vinsamlegast skr\u00e1\u00f0u \u00feig inn aftur.',
                en: 'Session expired. Please sign in again.'
            }, true);
        }

        // Form submission
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isSignup = document.querySelector('.tab-btn.active').dataset.tab === 'signup';

            // Disable submit button during processing
            submitBtn.disabled = true;

            try {
                if (isSignup) {
                    // Sign up
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    const fullName = document.getElementById('fullName').value;
                    const phone = document.getElementById('phone').value;
                    const address = document.getElementById('address').value;
                    const city = document.getElementById('city').value;
                    const postalCode = document.getElementById('postalCode').value;

                    // Validate passwords match
                    if (password !== confirmPassword) {
                        sleipnirAuth.showAuthMessage({
                            is: 'Lykilor\u00f0 passa ekki saman',
                            en: 'Passwords do not match'
                        }, true);
                        submitBtn.disabled = false;
                        return;
                    }

                    const result = await sleipnirAuth.signUp(email, password, {
                        fullName,
                        phone,
                        address,
                        city,
                        postalCode
                    });

                    if (result.success) {
                        if (result.emailVerificationSent && result.message) {
                            sleipnirAuth.showAuthMessage(result.message, false);
                        }

                        sleipnirAuth.showAuthMessage({
                            is: 'A\u00f0gangur b\u00fainn til! Vinsamlegast sta\u00f0festu netfangi\u00f0 \u00feitt me\u00f0 \u00fev\u00ed a\u00f0 smella \u00e1 hlekkinn \u00ed t\u00f6lvup\u00f3stinum.',
                            en: 'Account created! Please verify your email by clicking the link in the email we sent you.'
                        }, false);

                        document.getElementById('authForm').reset();

                        tabs.forEach(t => t.classList.remove('active'));
                        tabs[0].classList.add('active');
                        confirmGroup.style.display = 'none';
                        nameGroup.style.display = 'none';
                        phoneGroup.style.display = 'none';
                        addressGroup.style.display = 'none';
                        cityGroup.style.display = 'none';
                        postalGroup.style.display = 'none';

                        submitBtn.setAttribute('data-i18n', 'login.btn.login');
                        submitBtn.textContent = window.SleipnirI18n.t('login.btn.login', 'Login');
                    } else {
                        sleipnirAuth.showAuthMessage(result.error, true);
                        submitBtn.disabled = false;
                    }
                } else {
                    // Sign in
                    let result;

                    if (redirect === 'admin') {
                        result = await sleipnirAuth.adminSignIn(email, password);

                        if (result.success) {
                            sleipnirAuth.showAuthMessage({
                                is: 'Innskr\u00e1ning t\u00f3kst! Bei\u00f0...',
                                en: 'Login successful! Redirecting...'
                            }, false);

                            setTimeout(() => {
                                window.location.href = '/pages/admin.html';
                            }, 1000);
                        } else {
                            sleipnirAuth.showAuthMessage(result.error, true);
                            submitBtn.disabled = false;
                        }
                    } else {
                        result = await sleipnirAuth.signIn(email, password);

                        if (result.success) {
                            const userData = sleipnirAuth.getCurrentUserData();

                            if (userData.isEmailVerified) {
                                sleipnirAuth.showAuthMessage({
                                    is: 'Innskr\u00e1ning t\u00f3kst! Bei\u00f0...',
                                    en: 'Login successful! Redirecting...'
                                }, false);

                                setTimeout(() => {
                                    window.location.href = '/index.html';
                                }, 1000);
                            } else {
                                sleipnirAuth.showAuthMessage({
                                    is: 'Vinsamlegast sta\u00f0festu netfangi\u00f0 \u00feitt \u00e1\u00f0ur en \u00fe\u00fa heldur \u00e1fram. Athuga\u00f0u p\u00f3sth\u00f3lfi\u00f0 \u00feitt.',
                                    en: 'Please verify your email before continuing. Check your inbox.'
                                }, true);

                                sleipnirAuth.showEmailVerificationPrompt();
                                submitBtn.disabled = false;
                            }
                        } else {
                            sleipnirAuth.showAuthMessage(result.error, true);
                            submitBtn.disabled = false;
                        }
                    }
                }
            } catch (error) {
                console.error('Authentication error:', error);
                sleipnirAuth.showAuthMessage({
                    is: 'Lykilor\u00f0 e\u00f0a netfang er rangt',
                    en: 'Password or email is incorrect'
                }, true);
                submitBtn.disabled = false;
            }
        });

        // Social login handlers
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const provider = btn.textContent.includes('Google') ? 'google' : 'facebook';

                try {
                    let result;
                    if (provider === 'google') {
                        result = await sleipnirAuth.signInWithGoogle();
                    } else {
                        result = await sleipnirAuth.signInWithFacebook();
                    }

                    if (result.success) {
                        sleipnirAuth.showAuthMessage({
                            is: 'Innskr\u00e1ning t\u00f3kst! Bei\u00f0...',
                            en: 'Login successful! Redirecting...'
                        }, false);

                        const userData = sleipnirAuth.getCurrentUserData();
                        if (userData.isAdmin && redirect === 'admin') {
                            await sleipnirAuth.initializeAdminSession();
                            setTimeout(() => {
                                window.location.href = '/pages/admin.html';
                            }, 1000);
                        } else {
                            setTimeout(() => {
                                window.location.href = '/index.html';
                            }, 1000);
                        }
                    } else {
                        sleipnirAuth.showAuthMessage(result.error, true);
                    }
                } catch (error) {
                    console.error('Social login error:', error);
                    sleipnirAuth.showAuthMessage({
                        is: 'Villa kom upp vi\u00f0 innskr\u00e1ningu.',
                        en: 'Error during sign in.'
                    }, true);
                }
            });
        });

        // Forgot password handler
        document.querySelector('.split-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            if (!email) {
                sleipnirAuth.showAuthMessage({
                    is: 'Vinsamlegast sl\u00e1\u00f0u inn netfang',
                    en: 'Please enter your email address'
                }, true);
                return;
            }

            try {
                const result = await sleipnirAuth.sendPasswordResetEmail(email);
                if (result.success) {
                    sleipnirAuth.showAuthMessage({
                        is: 'T\u00f6lvup\u00f3stur sendur! Athuga\u00f0u p\u00f3sth\u00f3lfi\u00f0 \u00feitt.',
                        en: 'Email sent! Check your inbox.'
                    }, false);
                } else {
                    sleipnirAuth.showAuthMessage(result.error, true);
                }
            } catch (error) {
                console.error('Password reset error:', error);
                sleipnirAuth.showAuthMessage({
                    is: 'Lykilor\u00f0 e\u00f0a netfang er rangt',
                    en: 'Password or email is incorrect'
                }, true);
            }
        });

        // Add hover effect to input icons and handle autofill
        const inputs = document.querySelectorAll('.split-input-group input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.input-icon').style.transform = 'translateY(-50%) scale(1.2)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.input-icon').style.transform = 'translateY(-50%) scale(1)';
            });

            input.addEventListener('input', () => {
                if (input.value) {
                    input.parentElement.classList.add('has-value');
                } else {
                    input.parentElement.classList.remove('has-value');
                }
            });

            if (input.value) {
                input.parentElement.classList.add('has-value');
            }
        });

        // Detect autofill
        function detectAutofill() {
            inputs.forEach(input => {
                try {
                    if (input.matches(':-webkit-autofill')) {
                        input.parentElement.classList.add('has-value');
                    }
                } catch (e) {
                    if (input.value) {
                        input.parentElement.classList.add('has-value');
                    }
                }
            });
        }

        window.addEventListener('load', detectAutofill);
        setTimeout(detectAutofill, 100);
        setTimeout(detectAutofill, 500);
        setTimeout(detectAutofill, 1000);

        inputs.forEach(input => {
            input.addEventListener('animationstart', (e) => {
                if (e.animationName === 'onAutoFillStart') {
                    input.parentElement.classList.add('has-value');
                }
            });
        });

        // Parallax scrolling effect
        let ticking = false;
        function updateParallax() {
            const scrolled = window.pageYOffset;
            const parallaxSpeed = 0.5;
            const bgPattern = document.querySelector('.visual-bg-pattern');
            const logoContainer = document.querySelector('.visual-logo-container');

            if (bgPattern) {
                bgPattern.style.transform = `translate(${scrolled * 0.1}px, ${scrolled * parallaxSpeed}px)`;
            }

            if (logoContainer) {
                logoContainer.style.transform = `translateY(${scrolled * 0.3}px)`;
            }

            ticking = false;
        }

        function requestTick() {
            if (!ticking) {
                window.requestAnimationFrame(updateParallax);
                ticking = true;
            }
        }

        window.addEventListener('scroll', requestTick);

        // Intersection Observer for scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        function observeElements() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.split-input-group').forEach(el => {
                observer.observe(el);
            });

            document.querySelectorAll('.split-form-header, .form-tabs, .split-submit-btn, .split-social-section').forEach(el => {
                el.classList.add('fade-in');
                observer.observe(el);
            });
        }

        window.addEventListener('load', () => {
            observeElements();
        });

        // Smooth scroll to form when clicking anywhere on visual section
        document.querySelector('.login-visual-section').addEventListener('click', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
                document.querySelector('.login-form-section').scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            }
        });
    </script>
</body>
</html>
