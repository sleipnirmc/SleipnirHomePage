<!-- Main Contact Section -->
<section class="contact-main">
    <div class="contact-container">
        <!-- Contact Form Card -->
        <div class="contact-card">
            <div class="card-header">
                <span class="rune">&#5225;</span>
                <h3 data-i18n="contact.form.title">Sendu Skilabo&eth;</h3>
            </div>

            <form class="contact-form" id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">
                            <span data-i18n="contact.form.name">Nafn</span> *
                        </label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">
                            <span data-i18n="contact.form.email">Netfang</span> *
                        </label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">
                        <span data-i18n="contact.form.message">Skilabo&eth;</span> *
                    </label>
                    <textarea id="message" name="message" rows="8" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full contact-submit-btn" id="sendButton">
                    <span class="btn-text" data-i18n="contact.form.submit">Senda Skilabo&eth;</span>
                    <span class="btn-loading" style="display: none;">
                        <span class="spinner"></span>
                    </span>
                </button>

                <!-- Success/Error Messages -->
                <div id="formSuccess" class="form-message success" data-i18n="contact.form.success">Skilabo&eth; send! Vi&eth; munum svara &thorn;&eacute;r flj&oacute;tlega.</div>
                <div id="formError" class="form-message error" data-i18n="contact.form.error">Villa vi&eth; a&eth; senda skilabo&eth;. Vinsamlegast reyndu aftur.</div>
            </form>
        </div>

        <!-- Map Card -->
        <div class="contact-card map-container">
            <div class="map-header">
                <h3 data-i18n="contact.map.title">Finndu okkur</h3>
                <p data-i18n="contact.map.subtitle">Komdu &iacute; heims&oacute;kn</p>
            </div>

            <div id="map"></div>

            <div class="contact-info-bar">
                <a href="https://maps.google.com/?q=Reykjavik+Iceland" target="_blank" rel="noopener" class="info-bar-item">
                    <svg class="info-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                        <circle cx="12" cy="9" r="2.5"/>
                    </svg>
                    <div class="info-bar-text">
                        <span class="info-bar-label" data-i18n="contact.info.location.title">Sta&eth;setning</span>
                        <span class="info-bar-value" data-i18n="contact.info.location.text">Reykjav&iacute;k, &Iacute;sland</span>
                    </div>
                </a>
                <div class="info-bar-divider"></div>
                <a href="mailto:sleipnirmcreykjavik@gmail.com" class="info-bar-item">
                    <svg class="info-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="M22 4L12 13 2 4"/>
                    </svg>
                    <div class="info-bar-text">
                        <span class="info-bar-label" data-i18n="contact.info.email.title">Netfang</span>
                        <span class="info-bar-value">sleipnirmcreykjavik@gmail.com</span>
                    </div>
                </a>
                <div class="info-bar-divider"></div>
                <a href="https://www.facebook.com/SleipnirMCReykjavik" target="_blank" rel="noopener" class="info-bar-item">
                    <svg class="info-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                    </svg>
                    <div class="info-bar-text">
                        <span class="info-bar-label" data-i18n="contact.info.facebook.title">Facebook</span>
                        <span class="info-bar-value">SleipnirMCReykjavik</span>
                    </div>
                </a>
            </div>
        </div>
    </div>
</section>
