<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleipnir MC Reykjav&iacute;k - Sagan</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/navbar.css">
</head>
<body>
    <!-- Navbar injected by JS -->
    <div id="navbar-root"></div>

    <!-- Story Hero -->
    <section class="hero hero-medium story-hero">
        <div class="hero-overlay"></div>
        <div class="northern-lights"></div>
        <div class="story-hero-content">
            <h1 data-i18n="sagan.hero.title">Sagan Okkar</h1>
            <p class="tagline" data-i18n="sagan.hero.tagline">Fr&aacute; upphafi til dagsins &iacute; dag</p>
        </div>
    </section>

    <!-- Main Story Content -->
    <section class="story-content">
        <div class="story-container">
            <div id="storyContent" class="story-text">
                <!-- Story content will be loaded from Firebase -->
                <div class="story-loading">
                    <div class="spinner"></div>
                    <p data-i18n="sagan.loading">Hle&eth;ur s&ouml;gu...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Timeline Section -->
    <section class="timeline-section">
        <div class="timeline-container">
            <div class="timeline-header">
                <h2 data-i18n="sagan.milestones.title">T&iacute;mam&oacute;t</h2>
            </div>
            <div class="timeline" id="timeline">
                <div class="timeline-item">
                    <div class="timeline-content">
                        <div class="timeline-year">2015</div>
                        <div class="timeline-event" data-i18n="sagan.timeline.2015">Sleipnir MC Reykjav&iacute;k stofna&eth;</div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-content">
                        <div class="timeline-year">2018</div>
                        <div class="timeline-event" data-i18n="sagan.timeline.2018">Fyrsta st&oacute;ra fer&eth;in okkar um &Iacute;sland</div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-content">
                        <div class="timeline-year">2020</div>
                        <div class="timeline-event" data-i18n="sagan.timeline.2020">Opnu&eth;um n&yacute;ja h&ouml;fu&eth;st&ouml;&eth;var</div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-content">
                        <div class="timeline-year">2025</div>
                        <div class="timeline-event" data-i18n="sagan.timeline.2025">10 &aacute;ra afm&aelig;li</div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Decorative Norse Element -->
    <div class="norse-decoration">
        <span class="norse-symbol-large">&#5765;</span>
    </div>

    <!-- Edit Button (shown only for admins) -->
    <button id="editBtn" class="edit-btn" onclick="toggleEditMode()">
        <span data-i18n="sagan.edit.button">Breyta S&ouml;gu</span>
    </button>

    <!-- Footer injected by JS -->
    <div id="footer-root"></div>

    <!-- Core scripts -->
    <script src="/js/i18n.js"></script>
    <script src="/js/translations/core.js"></script>
    <script src="/js/translations/sagan.js"></script>
    <script src="/js/nav-config.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js"></script>

    <!-- Firebase + Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/authentication.js"></script>

    <!-- Page-specific script: story loading, edit mode, timeline animation -->
    <script>
        let isEditMode = false;
        let originalContent = '';

        // Get current language from i18n system
        function getCurrentLang() {
            return window.currentLang || 'is';
        }

        // Load story content from Firebase
        async function loadStoryContent() {
            const storyContent = document.getElementById('storyContent');
            const lang = getCurrentLang();

            try {
                const doc = await firebase.firestore()
                    .collection('siteContent')
                    .doc('story')
                    .get();

                if (doc.exists) {
                    const data = doc.data();
                    const content = lang === 'is' ? data.contentIs : data.contentEn;

                    if (content) {
                        storyContent.innerHTML = content;
                    } else {
                        showEmptyState();
                    }
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading story:', error);
                const lang = getCurrentLang();
                const errorMsg = lang === 'is' ? 'Villa vi\u00f0 a\u00f0 hla\u00f0a s\u00f6gu.' : 'Error loading story.';
                storyContent.innerHTML = `
                    <div class="story-empty">
                        <span class="rune">\u16A6</span>
                        <p>${errorMsg}</p>
                    </div>
                `;
            }
        }

        // Show empty state
        function showEmptyState() {
            const lang = getCurrentLang();
            const title = lang === 'is' ? 'Engin saga enn' : 'No story yet';
            const text = lang === 'is' ? 'Sagan ver\u00f0ur birt h\u00e9r flj\u00f3tlega.' : 'The story will be published here soon.';
            document.getElementById('storyContent').innerHTML = `
                <div class="story-empty">
                    <span class="rune">\u16C9</span>
                    <h2>${title}</h2>
                    <p>${text}</p>
                </div>
            `;
        }

        // Toggle edit mode
        async function toggleEditMode() {
            const storyContent = document.getElementById('storyContent');
            const editBtn = document.getElementById('editBtn');
            const lang = getCurrentLang();

            if (!isEditMode) {
                // Enter edit mode
                originalContent = storyContent.innerHTML;
                storyContent.contentEditable = true;
                storyContent.classList.add('edit-mode');
                const saveText = lang === 'is' ? 'Vista S\u00f6gu' : 'Save Story';
                editBtn.querySelector('[data-i18n]').textContent = saveText;
                editBtn.classList.add('save-btn');

                // If empty, add template
                if (storyContent.querySelector('.story-empty')) {
                    storyContent.innerHTML = `
                        <h2>${lang === 'is' ? 'Titill S\u00f6gunnar' : 'Story Title'}</h2>
                        <p>${lang === 'is' ? 'Skrifa\u00f0u s\u00f6gu h\u00f3psins h\u00e9r...' : 'Write the group story here...'}</p>
                    `;
                }

                isEditMode = true;
            } else {
                // Save and exit edit mode
                try {
                    const content = storyContent.innerHTML;

                    // Update the appropriate language field
                    const updateData = {};
                    if (lang === 'is') {
                        updateData.contentIs = content;
                    } else {
                        updateData.contentEn = content;
                    }
                    updateData.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();

                    await firebase.firestore()
                        .collection('siteContent')
                        .doc('story')
                        .set(updateData, { merge: true });

                    // Exit edit mode
                    storyContent.contentEditable = false;
                    storyContent.classList.remove('edit-mode');
                    const editText = lang === 'is' ? 'Breyta S\u00f6gu' : 'Edit Story';
                    editBtn.querySelector('[data-i18n]').textContent = editText;
                    editBtn.classList.remove('save-btn');
                    isEditMode = false;

                    // Show success message
                    alert(lang === 'is' ? 'Saga vistu\u00f0!' : 'Story saved!');
                } catch (error) {
                    console.error('Error saving story:', error);
                    alert(lang === 'is' ? 'Villa vi\u00f0 a\u00f0 vista s\u00f6gu' : 'Error saving story');
                }
            }
        }

        // Check if user is admin and show edit button
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const userDoc = await firebase.firestore()
                        .collection('users')
                        .doc(user.uid)
                        .get();

                    if (userDoc.exists && userDoc.data().role === 'admin') {
                        document.getElementById('editBtn').style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error checking admin status:', error);
                }
            }
        });

        // Load content on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStoryContent();

            // Add scroll animation to timeline items
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -100px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.style.opacity = '1';
                        }, index * 200);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.timeline-item').forEach(item => {
                observer.observe(item);
            });
        });

        // Reload content when language changes via i18n system
        document.addEventListener('langchange', () => {
            if (!isEditMode) {
                loadStoryContent();
            }
        });
    </script>
</body>
</html>
