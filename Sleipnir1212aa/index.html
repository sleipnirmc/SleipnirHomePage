<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleipnir MC Reykjav&iacute;k - Official Homepage</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="homepage">
    <div id="navbar-root"></div>

    <!-- Hero Section - Full Screen -->
    <section class="hero hero-full" id="home">
        <div class="hero-overlay"></div>
        <div class="northern-lights"></div>
        <div class="hero-logo-bg"></div>
        <div class="hero-content">
            <h1 class="hero-title">
                NO DRUGS<br>
                NO ATTITUDE
            </h1>
            <div class="cta-group">
                <a href="/pages/shop.html" class="btn btn-primary" data-i18n="home.hero.cta.shop">Versla</a>
                <a href="/pages/about.html" class="btn btn-secondary" data-i18n="home.hero.cta.members">Me&eth;limir</a>
            </div>
        </div>
        <div class="frost-border"></div>
    </section>

    <div id="footer-root"></div>

    <!-- Core scripts -->
    <script src="/js/i18n.js"></script>
    <script src="/js/translations/core.js"></script>
    <script src="/js/translations/home.js"></script>
    <script src="/js/nav-config.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js"></script>

    <!-- Firebase + Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/authentication.js"></script>

    <script>
        // Northern lights parallax animation
        var lastScrollY = window.scrollY;
        window.addEventListener('scroll', function () {
            var scrolled = window.pageYOffset;
            var lights = document.querySelector('.northern-lights');
            if (lights) {
                lights.style.transform = 'translateY(' + (scrolled * 0.3) + 'px)';
            }
            lastScrollY = scrolled;
        });
    </script>
</body>
</html>
