<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sleipnir MC Reykjavík</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/404.css">
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="divider"></div>
        <h1>
            <span class="is">Síða fannst ekki</span>
            <span class="en" style="display:none">Page Not Found</span>
        </h1>
        <p>
            <span class="is">Þessi síða er ekki til eða hefur verið fjarlægð.</span>
            <span class="en" style="display:none">This page doesn't exist or has been removed.</span>
        </p>
        <a href="/" class="btn-404">
            <span class="is">Aftur heim</span>
            <span class="en" style="display:none">Back Home</span>
        </a>
    </div>

    <script>
        // Respect saved language preference
        var lang = localStorage.getItem('language') || 'is';
        if (lang === 'en') {
            document.querySelectorAll('.is').forEach(function(el) { el.style.display = 'none'; });
            document.querySelectorAll('.en').forEach(function(el) { el.style.display = ''; });
        }
    </script>
</body>
</html>
