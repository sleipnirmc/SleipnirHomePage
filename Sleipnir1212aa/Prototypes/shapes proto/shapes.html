<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Shapes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Sora:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060e;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'IBM Plex Mono', monospace;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }

  #ui {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    z-index: 10;
    pointer-events: none;
  }

  #shape-name {
    font-family: 'Sora', sans-serif;
    font-weight: 200;
    font-size: 15px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(180, 200, 255, 0.7);
    text-shadow: 0 0 20px rgba(100, 140, 255, 0.15);
  }

  #next-btn {
    pointer-events: all;
    background: rgba(10, 12, 30, 0.65);
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 6px;
    color: rgba(160, 190, 255, 0.8);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 10px 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #next-btn:hover {
    background: rgba(25, 35, 70, 0.75);
    border-color: rgba(120, 170, 255, 0.45);
    color: rgba(210, 225, 255, 1);
    box-shadow: 0 0 20px rgba(80, 130, 255, 0.1);
  }

  #shape-counter {
    font-size: 10px;
    color: rgba(100, 140, 255, 0.35);
    letter-spacing: 0.25em;
  }

  #fps {
    position: fixed;
    top: 12px;
    left: 14px;
    color: rgba(100, 150, 255, 0.45);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="fps">-- FPS</div>

<div id="ui">
  <div id="shape-name">NEBULA DRIFT</div>
  <button id="next-btn">NEXT SHAPE ▸</button>
  <div id="shape-counter">1 / 3</div>
</div>

<script>
/* ═══════════════════════════════════════
   CANVAS + GLOBALS
   ═══════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;

let shapeReady = false;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
  if (shapeReady) initFns[currentShape]();
}
resize();
window.addEventListener('resize', resize);

/* ── FPS ── */
const fpsEl = document.getElementById('fps');
let fpsFrames = 0, fpsLast = performance.now();
setInterval(() => {
  const now = performance.now();
  fpsEl.textContent = Math.round(fpsFrames / ((now - fpsLast) / 1000)) + ' FPS';
  fpsFrames = 0;
  fpsLast = now;
}, 500);

/* ── State ── */
let currentShape = 0;
const SHAPES = ['NEBULA DRIFT', 'HEX PULSE GRID', 'WARP FILAMENTS'];
let time = 0;
let lastTs = 0;
let transitioning = false;
let tAlpha = 1;   // transition opacity
let tDir = 0;     // -1 out, +1 in

/* ── UI ── */
const nameEl = document.getElementById('shape-name');
const counterEl = document.getElementById('shape-counter');
const nextBtn = document.getElementById('next-btn');

nextBtn.addEventListener('click', () => {
  if (transitioning) return;
  transitioning = true;
  tDir = -1;
});

function updateUI() {
  nameEl.textContent = SHAPES[currentShape];
  counterEl.textContent = `${currentShape + 1} / ${SHAPES.length}`;
}

/* ── Math helpers ── */
function project(x, y, z) {
  const p = 900;
  const s = p / (p + z);
  return { x: CX + x * s, y: CY + y * s, s, z };
}

function rotate(x, y, z, ry, rx) {
  const cy = Math.cos(ry), sy = Math.sin(ry);
  const x1 = x * cy - z * sy, z1 = x * sy + z * cy;
  const cx = Math.cos(rx), sx = Math.sin(rx);
  return { x: x1, y: y * cx - z1 * sx, z: y * sx + z1 * cx };
}

/* ═══════════════════════════════════════
   NOISE (value noise + FBM for Nebula)
   ═══════════════════════════════════════ */
const NS = 256;
const ntab = new Float32Array(NS * NS);
for (let i = 0; i < ntab.length; i++) ntab[i] = Math.random();

function noise2(x, y) {
  const xi = ((Math.floor(x) % NS) + NS) % NS;
  const yi = ((Math.floor(y) % NS) + NS) % NS;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const sx = xf * xf * (3 - 2 * xf), sy = yf * yf * (3 - 2 * yf);
  const x1 = (xi + 1) % NS, y1 = (yi + 1) % NS;
  const a = ntab[yi * NS + xi], b = ntab[yi * NS + x1];
  const c = ntab[y1 * NS + xi], d = ntab[y1 * NS + x1];
  return a + sx * (b - a) + sy * (c - a) + sx * sy * (a - b - c + d);
}

function fbm(x, y, oct) {
  let v = 0, a = 1, f = 1, m = 0;
  for (let i = 0; i < oct; i++) { v += noise2(x * f, y * f) * a; m += a; a *= 0.5; f *= 2; }
  return v / m;
}


/* ═══════════════════════════════════════
   SHAPE 1 — NEBULA DRIFT
   Organic particle clouds + flow fields
   ═══════════════════════════════════════ */
const NEB_N = 350;
let nebParts = [];

function initNebula() {
  nebParts = [];
  for (let i = 0; i < NEB_N; i++) {
    nebParts.push({
      x: Math.random() * W,
      y: Math.random() * H,
      layer: Math.floor(Math.random() * 3),
      size: 0.8 + Math.random() * 2.5,
      hue: 220 + Math.random() * 80,
      alpha: 0.15 + Math.random() * 0.45,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawNebula(dt) {
  // Large ambient clouds
  for (let i = 0; i < 5; i++) {
    const cx = CX + Math.sin(time * 0.07 + i * 1.3) * W * 0.28;
    const cy = CY + Math.cos(time * 0.055 + i * 1.8) * H * 0.22;
    const r = Math.min(W, H) * (0.18 + 0.06 * Math.sin(time * 0.15 + i));
    const hue = 235 + i * 18 + Math.sin(time * 0.12 + i) * 12;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, `hsla(${hue}, 65%, 45%, 0.045)`);
    g.addColorStop(0.5, `hsla(${hue + 15}, 50%, 30%, 0.02)`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Particles per layer (back → front)
  for (let layer = 0; layer < 3; layer++) {
    const speed = 0.25 + layer * 0.2;
    const scale = 0.0018 - layer * 0.0003;

    for (const p of nebParts) {
      if (p.layer !== layer) continue;

      const angle = fbm(p.x * scale + time * 0.04, p.y * scale + time * 0.025, 3) * Math.PI * 4;
      p.x += Math.cos(angle) * speed * 55 * dt;
      p.y += Math.sin(angle) * speed * 55 * dt;

      // Wrap around edges
      if (p.x < -30) p.x += W + 60;
      if (p.x > W + 30) p.x -= W + 60;
      if (p.y < -30) p.y += H + 60;
      if (p.y > H + 30) p.y -= H + 60;

      p.phase += dt * (0.4 + layer * 0.25);
      const breath = 0.5 + 0.5 * Math.sin(p.phase);
      const a = p.alpha * breath * (0.35 + layer * 0.25);
      const sz = p.size * (1 + layer * 0.5) * (0.85 + breath * 0.3);
      const hue = p.hue + Math.sin(time * 0.3 + p.phase) * 15;

      // Soft glow halo
      const glowR = sz * 6;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
      g.addColorStop(0, `hsla(${hue}, 70%, 60%, ${a * 0.55})`);
      g.addColorStop(0.35, `hsla(${hue + 10}, 55%, 40%, ${a * 0.2})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
      ctx.fill();

      // Core point
      ctx.fillStyle = `hsla(${hue}, 85%, 78%, ${a * 1.2})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Subtle star-field twinkle (background depth)
  ctx.fillStyle = 'rgba(200, 210, 255, 0.5)';
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137.508 + time * 2) % W);
    const sy = ((i * 89.333 + time * 1.3) % H);
    const twinkle = 0.2 + 0.8 * Math.abs(Math.sin(time * 2 + i * 0.7));
    ctx.globalAlpha = twinkle * 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}


/* ═══════════════════════════════════════
   SHAPE 2 — HEX PULSE GRID
   Hexagonal grid with cascading energy
   ═══════════════════════════════════════ */
let hexNodes = [];
let hexEdges = [];
let hexPulses = [];
let hexTimer = 0;

function initHex() {
  hexNodes = [];
  hexEdges = [];
  hexPulses = [];
  hexTimer = 0;

  const s3 = Math.sqrt(3);
  const cols = Math.ceil(W / (HEX_SZ * 1.5)) + 3;
  const rows = Math.ceil(H / (HEX_SZ * s3)) + 3;

  for (let r = -1; r < rows; r++) {
    for (let c = -1; c < cols; c++) {
      const x = c * HEX_SZ * 1.5;
      const y = r * HEX_SZ * s3 + (c % 2 ? HEX_SZ * s3 * 0.5 : 0);
      hexNodes.push({ x, y, energy: 0, hue: 185 + Math.random() * 25 });
    }
  }

  // Precompute edges (neighbor threshold)
  const threshold = (HEX_SZ * 1.75) ** 2;
  for (let i = 0; i < hexNodes.length; i++) {
    for (let j = i + 1; j < hexNodes.length; j++) {
      const dx = hexNodes[i].x - hexNodes[j].x;
      const dy = hexNodes[i].y - hexNodes[j].y;
      if (dx * dx + dy * dy < threshold) {
        hexEdges.push([i, j]);
      }
    }
  }

  spawnHexPulse();
}

const HEX_SZ = 38;

function spawnHexPulse() {
  hexPulses.push({
    x: Math.random() * W,
    y: Math.random() * H,
    radius: 0,
    speed: 140 + Math.random() * 120,
    width: 55 + Math.random() * 45,
    hue: 170 + Math.random() * 50,
    intensity: 0.55 + Math.random() * 0.45,
  });
}

function drawHex(dt) {
  hexTimer += dt;
  if (hexTimer > 1.8) {
    hexTimer = 0;
    if (hexPulses.length < 5) spawnHexPulse();
  }

  // Update pulses
  for (let i = hexPulses.length - 1; i >= 0; i--) {
    hexPulses[i].radius += hexPulses[i].speed * dt;
    if (hexPulses[i].radius > Math.max(W, H) * 1.6) hexPulses.splice(i, 1);
  }

  // Update node energy from pulses
  for (const n of hexNodes) {
    n.energy *= 0.92;
    for (const p of hexPulses) {
      const dx = n.x - p.x, dy = n.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ring = Math.abs(dist - p.radius);
      if (ring < p.width) {
        const str = (1 - ring / p.width) * p.intensity;
        if (str > n.energy) {
          n.energy = str;
          n.hue = p.hue + (dist * 0.04) % 25;
        }
      }
    }
  }

  // Draw edges
  ctx.lineWidth = 0.6;
  for (const [i, j] of hexEdges) {
    const a = hexNodes[i], b = hexNodes[j];
    const e = Math.max(a.energy, b.energy);
    const alpha = 0.025 + e * 0.45;
    const hue = (a.hue + b.hue) * 0.5;
    ctx.strokeStyle = `hsla(${hue}, 55%, ${35 + e * 30}%, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  // Draw nodes
  for (const n of hexNodes) {
    const alpha = 0.06 + n.energy * 0.85;
    const sz = 1.2 + n.energy * 4.5;

    // Glow on active nodes
    if (n.energy > 0.12) {
      const gr = sz * 5;
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, gr);
      g.addColorStop(0, `hsla(${n.hue}, 85%, 72%, ${n.energy * 0.45})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x, n.y, gr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Core dot
    ctx.fillStyle = `hsla(${n.hue}, 70%, ${48 + n.energy * 32}%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(n.x, n.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ambient hexagon outlines in the background
  ctx.globalAlpha = 0.015 + Math.sin(time * 0.5) * 0.005;
  ctx.strokeStyle = 'rgba(120, 200, 220, 0.3)';
  ctx.lineWidth = 0.3;
  for (let i = 0; i < 6; i++) {
    const cx = CX + Math.cos(i * Math.PI / 3 + time * 0.03) * Math.min(W, H) * 0.25;
    const cy = CY + Math.sin(i * Math.PI / 3 + time * 0.03) * Math.min(W, H) * 0.25;
    const r = 60 + Math.sin(time * 0.3 + i) * 15;
    ctx.beginPath();
    for (let v = 0; v <= 6; v++) {
      const a = (v / 6) * Math.PI * 2 - Math.PI / 6;
      const px = cx + Math.cos(a) * r;
      const py = cy + Math.sin(a) * r;
      v === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}


/* ═══════════════════════════════════════
   SHAPE 3 — WARP FILAMENTS
   3D flowing curves in space
   ═══════════════════════════════════════ */
const FIL_N = 55;
const FIL_PTS = 45;
let filaments = [];

function initFilaments() {
  filaments = [];
  for (let i = 0; i < FIL_N; i++) {
    const pts = [];
    const baseA = Math.random() * Math.PI * 2;
    const basePhi = Math.acos(1 - 2 * Math.random());
    const rad = 160 + Math.random() * 140;

    for (let j = 0; j < FIL_PTS; j++) {
      const t = j / FIL_PTS;
      pts.push({
        angle: baseA + t * Math.PI * (0.4 + Math.random() * 0.8),
        phi: basePhi + (t - 0.5) * Math.PI * 0.55,
        r: rad + (Math.random() - 0.5) * 35,
        wPhase: Math.random() * Math.PI * 2,
        wAmp: 4 + Math.random() * 14,
        wFreq: 0.8 + Math.random() * 2,
      });
    }

    filaments.push({
      pts,
      hueBase: Math.random() > 0.5 ? 28 + Math.random() * 28 : 205 + Math.random() * 35,
      opacity: 0.25 + Math.random() * 0.5,
      width: 0.4 + Math.random() * 1.6,
    });
  }
}

function drawFilaments(dt) {
  const ry = time * 0.12;
  const rx = 0.28 + Math.sin(time * 0.08) * 0.12;

  // Collect segments for z-sorting
  const segs = [];

  for (const f of filaments) {
    const proj = [];
    for (let j = 0; j < f.pts.length; j++) {
      const p = f.pts[j];
      const wave = Math.sin(time * p.wFreq + p.wPhase + j * 0.25) * p.wAmp;
      const breathe = 1 + Math.sin(time * 0.4) * 0.04;
      const r = (p.r + wave) * breathe;
      const x = r * Math.sin(p.phi) * Math.cos(p.angle);
      const y = r * Math.cos(p.phi);
      const z = r * Math.sin(p.phi) * Math.sin(p.angle);
      const rot = rotate(x, y, z, ry, rx);
      proj.push(project(rot.x, rot.y, rot.z));
    }
    const avgZ = proj.reduce((s, p) => s + p.z, 0) / proj.length;
    segs.push({ proj, f, avgZ });
  }

  segs.sort((a, b) => a.avgZ - b.avgZ);

  // Draw filaments
  for (const seg of segs) {
    const { proj, f } = seg;
    const depthF = Math.max(0.15, Math.min(1, 0.3 + 0.7 * ((seg.avgZ + 350) / 700)));
    const hShift = Math.sin(time * 0.18) * 18;
    const hue = f.hueBase + hShift;

    // Outer glow line (thicker, more transparent)
    ctx.strokeStyle = `hsla(${hue}, 50%, ${40 + depthF * 15}%, ${f.opacity * depthF * 0.2})`;
    ctx.lineWidth = (f.width + 3) * depthF;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(proj[0].x, proj[0].y);
    for (let j = 1; j < proj.length - 1; j++) {
      const xc = (proj[j].x + proj[j + 1].x) / 2;
      const yc = (proj[j].y + proj[j + 1].y) / 2;
      ctx.quadraticCurveTo(proj[j].x, proj[j].y, xc, yc);
    }
    ctx.stroke();

    // Core line
    ctx.strokeStyle = `hsla(${hue}, 65%, ${48 + depthF * 22}%, ${f.opacity * depthF})`;
    ctx.lineWidth = f.width * depthF;
    ctx.beginPath();
    ctx.moveTo(proj[0].x, proj[0].y);
    for (let j = 1; j < proj.length - 1; j++) {
      const xc = (proj[j].x + proj[j + 1].x) / 2;
      const yc = (proj[j].y + proj[j + 1].y) / 2;
      ctx.quadraticCurveTo(proj[j].x, proj[j].y, xc, yc);
    }
    ctx.stroke();

    // Bright vertex dots
    for (let j = 0; j < proj.length; j += 5) {
      const pp = proj[j];
      const a = f.opacity * depthF * 0.55;
      ctx.fillStyle = `hsla(${hue}, 85%, 78%, ${a})`;
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, 1.3 * pp.s, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Central warm glow
  const gr = 90 + Math.sin(time * 0.35) * 12;
  const g1 = ctx.createRadialGradient(CX, CY, 0, CX, CY, gr);
  g1.addColorStop(0, `hsla(38, 55%, 55%, 0.04)`);
  g1.addColorStop(0.5, `hsla(30, 40%, 40%, 0.015)`);
  g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1;
  ctx.beginPath();
  ctx.arc(CX, CY, gr, 0, Math.PI * 2);
  ctx.fill();

  // Outer cool glow
  const gr2 = 280 + Math.sin(time * 0.2) * 20;
  const g2 = ctx.createRadialGradient(CX, CY, gr * 0.8, CX, CY, gr2);
  g2.addColorStop(0, 'transparent');
  g2.addColorStop(0.4, `hsla(220, 40%, 30%, 0.012)`);
  g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2;
  ctx.beginPath();
  ctx.arc(CX, CY, gr2, 0, Math.PI * 2);
  ctx.fill();
}


/* ═══════════════════════════════════════
   MAIN LOOP
   ═══════════════════════════════════════ */
const initFns = [initNebula, initHex, initFilaments];
const drawFns = [drawNebula, drawHex, drawFilaments];

initFns[currentShape]();
shapeReady = true;

function frame(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;
  fpsFrames++;
  time += dt;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Transition logic
  if (transitioning) {
    if (tDir === -1) {
      tAlpha -= dt * 2.8;
      if (tAlpha <= 0) {
        tAlpha = 0;
        tDir = 1;
        currentShape = (currentShape + 1) % SHAPES.length;
        initFns[currentShape]();
        updateUI();
      }
    } else if (tDir === 1) {
      tAlpha += dt * 2.5;
      if (tAlpha >= 1) {
        tAlpha = 1;
        transitioning = false;
        tDir = 0;
      }
    }
  }

  ctx.globalAlpha = tAlpha;
  drawFns[currentShape](dt);
  ctx.globalAlpha = 1;

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
