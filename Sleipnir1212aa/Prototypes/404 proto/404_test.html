<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Thinking</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Sora:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'IBM Plex Mono', monospace;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  canvas {
    display: block;
    border-radius: 12px;
  }

  #fps {
    position: fixed;
    top: 10px;
    left: 10px;
    color: rgba(100, 150, 255, 0.6);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    pointer-events: none;
  }

  /* ── Control Panel ── */
  #panel {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(10, 12, 30, 0.92);
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 8px;
    padding: 16px;
    width: 260px;
    color: rgba(180, 200, 255, 0.85);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    z-index: 10;
  }

  #panel h3 {
    margin: 0 0 12px 0;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: rgba(140, 170, 255, 0.9);
    border-bottom: 1px solid rgba(100, 150, 255, 0.15);
    padding-bottom: 8px;
  }

  .ctrl-group {
    margin-bottom: 10px;
  }

  .ctrl-group label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 3px;
  }

  .ctrl-group label span.val {
    color: rgba(160, 190, 255, 0.7);
  }

  .ctrl-group input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(60, 90, 180, 0.3);
    border-radius: 2px;
    outline: none;
  }

  .ctrl-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(120, 160, 255, 0.8);
    cursor: pointer;
  }

  .ctrl-group input[type="color"] {
    width: 100%;
    height: 24px;
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    padding: 0;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(100, 140, 255, 0.5);
    margin: 12px 0 6px 0;
    text-transform: uppercase;
  }

  #saveBtn, #copyBtn {
    width: 100%;
    padding: 7px;
    margin-top: 6px;
    background: rgba(60, 100, 220, 0.2);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 4px;
    color: rgba(160, 190, 255, 0.9);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #saveBtn:hover, #copyBtn:hover {
    background: rgba(60, 100, 220, 0.4);
  }

  #configOutput {
    display: none;
    margin-top: 8px;
    padding: 8px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(100, 150, 255, 0.15);
    border-radius: 4px;
    font-size: 10px;
    color: rgba(140, 170, 255, 0.8);
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
  }

  #togglePanel {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(10, 12, 30, 0.8);
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 4px;
    color: rgba(160, 190, 255, 0.8);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    z-index: 11;
    display: none;
  }
</style>
</head>
<body>
<div class="container">
  <canvas id="orb" width="800" height="800"></canvas>
</div>
<div id="fps">-- FPS</div>

<button id="togglePanel">CONTROLS</button>

<div id="panel">
  <h3>ORB CONTROLS</h3>

  <div class="section-label">Speed</div>
  <div class="ctrl-group">
    <label>Rotation <span class="val" id="rotVal">0.36</span></label>
    <input type="range" id="rotSpeed" min="0.05" max="1.5" step="0.01" value="0.36">
  </div>
  <div class="ctrl-group">
    <label>Pulse Speed <span class="val" id="pulseSpeedVal">0.40</span></label>
    <input type="range" id="pulseSpeed" min="0.1" max="2.0" step="0.05" value="0.40">
  </div>
  <div class="ctrl-group">
    <label>Pulse Speed Range <span class="val" id="pulseRangeVal">0.35</span></label>
    <input type="range" id="pulseRange" min="0" max="1.5" step="0.05" value="0.35">
  </div>

  <div class="section-label">Orb Color</div>
  <div class="ctrl-group">
    <label>Base Hue <span class="val" id="orbHueVal">220</span></label>
    <input type="range" id="orbHue" min="0" max="360" step="1" value="220">
  </div>
  <div class="ctrl-group">
    <label>Hue Variation <span class="val" id="orbHueVarVal">30</span></label>
    <input type="range" id="orbHueVar" min="0" max="80" step="1" value="30">
  </div>
  <div class="ctrl-group">
    <label>Saturation <span class="val" id="orbSatVal">60</span></label>
    <input type="range" id="orbSat" min="0" max="100" step="1" value="60">
  </div>
  <div class="ctrl-group">
    <label>Luminance <span class="val" id="orbLumVal">55</span></label>
    <input type="range" id="orbLum" min="20" max="90" step="1" value="55">
  </div>

  <div class="section-label">Pulse Color</div>
  <div class="ctrl-group">
    <label>Pulse Hue <span class="val" id="pulseHueVal">210</span></label>
    <input type="range" id="pulseHue" min="0" max="360" step="1" value="210">
  </div>
  <div class="ctrl-group">
    <label>Pulse Hue Range <span class="val" id="pulseHueRangeVal">60</span></label>
    <input type="range" id="pulseHueRange" min="0" max="120" step="1" value="60">
  </div>

  <button id="saveBtn">SAVE CONFIG</button>
  <button id="copyBtn" style="display:none">COPY TO CLIPBOARD</button>
  <div id="configOutput"></div>
</div>

<script>
const canvas = document.getElementById('orb');
const ctx = canvas.getContext('2d');
const W = 800, H = 800;
const CX = W / 2, CY = H / 2;

// ── Config (live-updated by sliders) ──
const cfg = {
  rotSpeed: 0.36,
  pulseSpeedBase: 0.40,
  pulseSpeedRange: 0.35,
  orbHue: 220,
  orbHueVar: 30,
  orbSat: 60,
  orbLum: 55,
  pulseHue: 210,
  pulseHueRange: 60,
};

// ── Panel Wiring ──
function wireSlider(id, cfgKey, valId) {
  const slider = document.getElementById(id);
  const valEl = document.getElementById(valId);
  slider.addEventListener('input', () => {
    cfg[cfgKey] = parseFloat(slider.value);
    valEl.textContent = slider.value;
  });
}

wireSlider('rotSpeed', 'rotSpeed', 'rotVal');
wireSlider('pulseSpeed', 'pulseSpeedBase', 'pulseSpeedVal');
wireSlider('pulseRange', 'pulseSpeedRange', 'pulseRangeVal');
wireSlider('orbHue', 'orbHue', 'orbHueVal');
wireSlider('orbHueVar', 'orbHueVar', 'orbHueVarVal');
wireSlider('orbSat', 'orbSat', 'orbSatVal');
wireSlider('orbLum', 'orbLum', 'orbLumVal');
wireSlider('pulseHue', 'pulseHue', 'pulseHueVal');
wireSlider('pulseHueRange', 'pulseHueRange', 'pulseHueRangeVal');

// ── Save / Copy Config ──
const saveBtn = document.getElementById('saveBtn');
const copyBtn = document.getElementById('copyBtn');
const configOutput = document.getElementById('configOutput');

saveBtn.addEventListener('click', () => {
  const out = JSON.stringify(cfg, null, 2);
  configOutput.textContent = out;
  configOutput.style.display = 'block';
  copyBtn.style.display = 'block';
});

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(configOutput.textContent).then(() => {
    copyBtn.textContent = 'COPIED!';
    setTimeout(() => { copyBtn.textContent = 'COPY TO CLIPBOARD'; }, 1500);
  });
});

// ── Toggle Panel ──
const panel = document.getElementById('panel');
const toggleBtn = document.getElementById('togglePanel');
toggleBtn.addEventListener('click', () => {
  panel.style.display = 'block';
  toggleBtn.style.display = 'none';
});
panel.addEventListener('dblclick', (e) => {
  if (e.target === panel || e.target.tagName === 'H3') {
    panel.style.display = 'none';
    toggleBtn.style.display = 'block';
  }
});

// ── FPS Counter ──
const fpsEl = document.getElementById('fps');
let fpsFrames = 0;
let fpsLastCheck = performance.now();
setInterval(() => {
  const now = performance.now();
  const elapsed = (now - fpsLastCheck) / 1000;
  fpsEl.textContent = Math.round(fpsFrames / elapsed) + ' FPS';
  fpsFrames = 0;
  fpsLastCheck = now;
}, 500);

// ── Orb Dots ──
const DOT_COUNT = 520;
const RADIUS = 300;
const dots = [];

for (let i = 0; i < DOT_COUNT; i++) {
  const phi = Math.acos(1 - 2 * (i + 0.5) / DOT_COUNT);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  dots.push({
    phi,
    theta,
    baseR: RADIUS + (Math.random() - 0.5) * 6,
    size: 1.2 + Math.random() * 1.6,
    hueRand: Math.random(),  // 0-1, multiplied by orbHueVar at render time
  });
}

// ── Pulse Waves ──
const MAX_PULSES = 3;
const pulses = [];
function spawnPulse() {
  if (pulses.length >= MAX_PULSES) return;
  pulses.push({
    angle: 0,
    speed: cfg.pulseSpeedBase + Math.random() * cfg.pulseSpeedRange,
    width: 0.25 + Math.random() * 0.2,
    intensity: 0.6 + Math.random() * 0.4,
    hue: cfg.pulseHue + Math.random() * cfg.pulseHueRange,
  });
}
setInterval(spawnPulse, 1500);
spawnPulse();

// ── Ambient ring particles ──
const ringParticles = [];
for (let i = 0; i < 80; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = RADIUS * 0.87 + Math.random() * (RADIUS * 0.4);
  ringParticles.push({
    angle: a,
    radius: r,
    speed: (0.06 + Math.random() * 0.18) * (Math.random() > 0.5 ? 1 : -1),
    size: 0.5 + Math.random() * 1.2,
    opacity: 0.1 + Math.random() * 0.25,
    yOff: (Math.random() - 0.5) * 80,
  });
}

// ── Rotation State ──
let rotY = 0;
const rotX = 0.35;
let time = 0;
let lastTimestamp = 0;

// ── Project 3D → 2D (increased perspective to reduce distortion) ──
function project(x, y, z) {
  const perspective = 1200;
  const scale = perspective / (perspective + z);
  return {
    x: CX + x * scale,
    y: CY + y * scale,
    scale,
    z
  };
}

// ── Rotate point ──
function rotate(x, y, z, ry, rx) {
  const cosY = Math.cos(ry), sinY = Math.sin(ry);
  const x1 = x * cosY - z * sinY;
  const z1 = x * sinY + z * cosY;
  const cosX = Math.cos(rx), sinX = Math.sin(rx);
  const y1 = y * cosX - z1 * sinX;
  const z2 = y * sinX + z1 * cosX;
  return { x: x1, y: y1, z: z2 };
}

// ── Draw Frame ──
function draw(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
  lastTimestamp = timestamp;
  fpsFrames++;

  time += dt;
  rotY += cfg.rotSpeed * dt;

  ctx.clearRect(0, 0, W, H);

  // ── Background glow ──
  const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 420);
  bgGrad.addColorStop(0, 'rgba(20, 30, 80, 0.15)');
  bgGrad.addColorStop(0.4, 'rgba(10, 15, 50, 0.08)');
  bgGrad.addColorStop(1, 'rgba(6, 6, 14, 0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // ── Core glow ──
  const coreGrad = ctx.createRadialGradient(CX, CY - 10, 0, CX, CY, RADIUS * 0.6);
  coreGrad.addColorStop(0, 'rgba(80, 120, 255, 0.06)');
  coreGrad.addColorStop(0.5, 'rgba(60, 90, 200, 0.02)');
  coreGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS * 0.6, 0, Math.PI * 2);
  ctx.fill();

  // ── Ambient ring particles ──
  for (const p of ringParticles) {
    p.angle += p.speed * dt;
    const px = CX + Math.cos(p.angle) * p.radius;
    const py = CY + Math.sin(p.angle) * 0.3 * p.radius + p.yOff;
    ctx.globalAlpha = p.opacity * (0.5 + 0.5 * Math.sin(time * 2 + p.angle));
    ctx.fillStyle = 'rgb(130, 170, 255)';
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Update pulses (delta-time based) ──
  for (let i = pulses.length - 1; i >= 0; i--) {
    pulses[i].angle += pulses[i].speed * dt;
    if (pulses[i].angle > Math.PI + pulses[i].width) {
      pulses.splice(i, 1);
    }
  }

  // ── Calculate dot positions and sort by Z ──
  const projected = [];

  for (const dot of dots) {
    const breathing = 1 + Math.sin(time * 1.5 + dot.phi * 3) * 0.02;
    const r = dot.baseR * breathing;

    const x = r * Math.sin(dot.phi) * Math.cos(dot.theta);
    const y = r * Math.cos(dot.phi);
    const z = r * Math.sin(dot.phi) * Math.sin(dot.theta);

    const rot = rotate(x, y, z, rotY, rotX);
    const p = project(rot.x, rot.y, rot.z);

    // ── Pulse influence ──
    let pulseBoost = 0;
    let pulseHue = cfg.pulseHue;
    for (const pulse of pulses) {
      const dist = Math.abs(dot.phi - pulse.angle);
      if (dist < pulse.width) {
        const strength = (1 - dist / pulse.width) * pulse.intensity;
        if (strength > pulseBoost) {
          pulseBoost = strength;
          pulseHue = pulse.hue;
        }
      }
    }

    projected.push({
      x: p.x,
      y: p.y,
      z: p.z,
      scale: p.scale,
      size: dot.size,
      pulseBoost,
      pulseHue,
      hueRand: dot.hueRand,
    });
  }

  projected.sort((a, b) => a.z - b.z);

  // ── Draw dots ──
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  for (const d of projected) {
    const depthFade = 0.25 + 0.75 * ((d.z + RADIUS) / (2 * RADIUS));
    const baseAlpha = (0.3 + depthFade * 0.5);
    const alpha = Math.min(1, baseAlpha + d.pulseBoost * 0.7);
    const radius = d.size * d.scale * (1 + d.pulseBoost * 1.8);

    const hue = d.pulseBoost > 0.1 ? d.pulseHue : cfg.orbHue + d.hueRand * cfg.orbHueVar;
    const sat = (d.pulseBoost > 0.1 ? cfg.orbSat : cfg.orbSat) + d.pulseBoost * 30;
    const lum = cfg.orbLum + d.pulseBoost * 35 + depthFade * 10;

    ctx.globalAlpha = alpha;

    if (d.pulseBoost > 0.5) {
      ctx.shadowColor = `hsla(${hue}, ${sat}%, ${lum}%, ${d.pulseBoost * 0.6})`;
      ctx.shadowBlur = 8 + d.pulseBoost * 7;
    }

    ctx.fillStyle = `hsl(${hue}, ${sat}%, ${lum}%)`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, radius, 0, Math.PI * 2);
    ctx.fill();

    if (d.pulseBoost > 0.5) {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }

  ctx.globalAlpha = 1;

  // ── Outer ring glow ──
  ctx.globalAlpha = 0.06 + Math.sin(time * 0.8) * 0.02;
  ctx.strokeStyle = 'rgba(100, 150, 255, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS + 30, 0, Math.PI * 2);
  ctx.stroke();

  // ── Orbital ring (equator) ──
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = 'rgba(140, 180, 255, 0.5)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  const ringPoints = 120;
  for (let i = 0; i <= ringPoints; i++) {
    const a = (i / ringPoints) * Math.PI * 2;
    const rx = RADIUS * 1.15 * Math.cos(a);
    const ry = 0;
    const rz = RADIUS * 1.15 * Math.sin(a);
    const rot = rotate(rx, ry, rz, rotY, rotX);
    const p = project(rot.x, rot.y, rot.z);
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
