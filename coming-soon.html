<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleipnir MC Reykjav&iacute;k — Coming Soon</title>
    <link rel="icon" type="image/png" href="/assets/images/SleipnirLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:wght@300;400;600&family=Iceland&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'VIKING-N';
            src: url('/assets/fonts/VIKING-N.woff');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #000;
            color: #acabab;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            height: 100vh;
            background:
                linear-gradient(180deg,
                    rgba(0,0,0,0.4) 0%,
                    rgba(0,0,0,0.6) 50%,
                    rgba(0,0,0,0.8) 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="%23000000"/><polygon points="0,600 480,400 960,500 1440,350 1920,450 1920,1080 0,1080" fill="%231a1a1a" opacity="0.9"/><polygon points="0,700 320,600 640,650 960,550 1280,600 1600,500 1920,550 1920,1080 0,1080" fill="%230a0a0a"/></svg>');
            background-size: cover;
            background-position: center;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        .northern-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255,0,0,0.05) 50%,
                rgba(204,0,0,0.05) 70%,
                transparent 100%
            );
            animation: aurora 20s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes aurora {
            0%, 100% { transform: translateX(-100%) translateY(-50%); }
            50% { transform: translateX(100%) translateY(50%); }
        }

        .hero-logo-bg {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2400px;
            height: 2400px;
            background: url('/assets/images/SleipnirLogo.png') no-repeat center center;
            background-size: contain;
            opacity: 0.4;
            z-index: 1;
        }

        .hero-content {
            z-index: 2;
            animation: fadeIn 1.2s ease-out;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: 72px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        .coming-soon-text {
            font-family: 'Iceland', cursive;
            font-size: 28px;
            color: #cf2342;
            text-transform: uppercase;
            letter-spacing: 10px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .frost-border {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 100"><path d="M0,50 Q480,20 960,50 T1920,50 L1920,100 L0,100 Z" fill="%23ff0000" opacity="0.05"/></svg>');
            background-size: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 1024px) {
            .hero-title { font-size: 56px; }
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 42px; }
            .coming-soon-text { font-size: 22px; letter-spacing: 6px; }
        }

        @media (max-width: 480px) {
            .hero-title { font-size: 32px; }
            .coming-soon-text { font-size: 18px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="northern-lights"></div>
        <div class="hero-logo-bg"></div>
        <div class="hero-content">
            <h1 class="hero-title">
                NO DRUGS<br>
                NO ATTITUDE
            </h1>
            <p class="coming-soon-text">Coming Soon</p>
        </div>
        <div class="frost-border"></div>
    </section>
</body>
</html>
